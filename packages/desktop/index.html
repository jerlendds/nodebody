<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InterfaceZ</title>
    <style>
      :root {
        color-scheme: dark;
        background: #11131b;
        color: #a9aecb;
      }

      * {
        box-sizing: border-box;
      }

      :focus {
        outline: none;
      }

      button {
        color: inherit;
        font: inherit;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          "Lato",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #app:empty {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      #app:empty::before {
        content: "InterfaceZ";
        font-size: 16px;
        font-weight: 500;
        background: linear-gradient(
          90deg,
          #a9aecb 0%,
          #a9aecb 34%,
          #eef2ff 48%,
          #eef2ff 56%,
          #aeb6cf 66%,
          #a9aecb 78%,
          #a9aecb 100%
        );
        background-size: 276% 100%;
        background-position: 150% 0;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        mask-image: linear-gradient(
          -75deg,
          rgba(0, 0, 0, 0.99) 30%,
          #000 50%,
          rgba(0, 0, 0, 0.99) 70%
        );
        mask-size: 220%;
        animation: nb-loading-shine 7.2s ease-in infinite;
      }

      @keyframes nb-loading-shine {
        from {
          background-position: 150% 0;
          -webkit-mask-position: 150%;
          mask-position: 150%;
        }

        to {
          background-position: -150% 0;
          -webkit-mask-position: -50%;
          mask-position: -50%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app:empty::before {
          animation-duration: 0.01ms;
          animation-iteration-count: 1;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
